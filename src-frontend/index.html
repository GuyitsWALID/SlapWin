<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlapMAC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>SlapMAC</h1>
            <p class="tagline">Your Mac deserves better. Make it slap.</p>
        </header>
        
        <main class="main-content">
            <div class="action-area">
                <button id="slap-btn" class="primary-btn">
                    <span class="icon">👋</span>
                    <span>SLAP IT GOOD</span>
                </button>
            </div>
            
            <div class="status-area">
                <p id="status-text">Ready to slap.</p>
            </div>
        </main>
        
        <footer class="footer">
            <span id="version">v0.1.0</span>
            <span class="separator">|</span>
            <span id="license-status">Unlicensed</span>
            <button id="trial-btn" class="trial-btn">Start 7-Day Trial</button>
            <button id="activate-btn" class="text-btn">Activate License</button>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
